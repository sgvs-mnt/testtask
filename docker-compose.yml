# docker-compose.yml
version: '3.8'

services:
  nginx1:
    image: nginx:alpine
    ports:
      - "8181:80"
    volumes:
      - ./nginx1/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy-net

  nginx2:
    image: nginx:alpine
    volumes:
      - ./nginx2/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy-net

  nginx3:
    image: nginx:alpine
    volumes:
      - ./nginx3/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - proxy-net
    depends_on:
      - app

  app:
    build: ./app
    networks:
      - proxy-net
    environment:
      - SHOW_HEADERS=1

networks:
  proxy-net:
    driver: bridge
